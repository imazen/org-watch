name: org-watch

# Alert (via email) when anyone other than the owner interacts with an imazen/* repo.
# Runs on a schedule; the steady-state 60-minute lookback window absorbs the fact that
# GitHub cron is best-effort and can be delayed or skipped under load.

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes (best-effort; the 60-min window covers jitter)
  workflow_dispatch:
    inputs:
      lookback_min:
        description: "Override lookback window in minutes (blank = normal)"
        required: false
        default: ""
      dry_run:
        description: "Print what would be sent, do not email or write state"
        type: boolean
        required: false
        default: false

# Never let two runs overlap and clobber the shared state variable.
concurrency:
  group: org-watch
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install notifier deps (Apprise)
        run: pip install --quiet apprise

      - name: Sweep org for outside activity
        env:
          # Data + state access: PAT with repo + read:org (classic) or equivalent fine-grained.
          GH_TOKEN: ${{ secrets.ORG_READ_TOKEN }}
          # Notifier (preferred): a single Apprise URL — Telegram/ntfy/Pushover/Discord/Slack/…
          APPRISE_URL: ${{ secrets.APPRISE_URL }}
          # Email delivery via SMTP (used only if APPRISE_URL is unset):
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USER: ${{ vars.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_TO: ${{ vars.ALERT_TO }}
          ALERT_FROM: ${{ vars.ALERT_FROM }}
          # Optional alternative sender (used only if SMTP_HOST is unset):
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # Optional overrides (sane defaults baked into watch.py):
          WATCH_ORG: ${{ vars.WATCH_ORG }}
          WATCH_SELF_LOGINS: ${{ vars.WATCH_SELF_LOGINS }}
          WATCH_BOT_DENYLIST: ${{ vars.WATCH_BOT_DENYLIST }}
          # Manual-dispatch knobs (empty on schedule):
          WATCH_LOOKBACK_MIN: ${{ github.event.inputs.lookback_min }}
          WATCH_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python3 watch.py
